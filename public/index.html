<style>
  :root {
    --bg: #f5f6f8; --surface: #ffffff; --border: #e2e5ea; --border-light: #f0f1f3;
    --text: #1a1d23; --text-2: #5f6776; --text-3: #9ba3b0;
    --accent: #6b3fa0; --accent-bg: #f3eefa; --accent-hover: #5a3488;
    --warn: #b45309; --warn-bg: #fef3e2;
    --red: #dc2626; --red-bg: #fef2f2;
    --blue: #2563eb; --blue-bg: #eff6ff;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', 'Fira Code', Consolas, monospace;
    --radius: 6px; --radius-lg: 10px;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  #root { height: 100vh; display: flex; flex-direction: column; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Inputs */
  .input { font-family: var(--font); font-size: 13px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); outline: none; width: 100%; transition: border-color 0.15s; background: var(--surface); color: var(--text); }
  .input:focus { border-color: var(--accent); }
  .input-sm { padding: 6px 10px; font-size: 12px; }
  textarea.input { resize: vertical; min-height: 60px; }
  select.input { cursor: pointer; }

  /* Buttons */
  .btn { font-family: var(--font); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }

  .btn-danger { color: var(--red); border-color: var(--red); }
  .btn-danger:hover { background: var(--red-bg); }

  /* Chat */
  .chat-msg { display: flex; gap: 10px; max-width: 640px; }
  .chat-msg.user { flex-direction: row-reverse; margin-left: auto; }
  .chat-avatar { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
  .chat-bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.55; }
  .chat-msg.assistant .chat-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  .chat-option:hover { border-color: #6b3fa0; color: #6b3fa0; background: #f3eefa; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(107,63,160,0.12); }
  .chat-time { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* Route card */
  .route-card { padding: 14px 16px; border-radius: var(--radius-lg); border-left: 4px solid; margin-top: 8px; max-width: 500px; }
  .route-card.worksome { border-color: var(--accent); background: var(--accent-bg); }
  .route-card.vms { border-color: var(--warn); background: var(--warn-bg); }

  /* Typing indicator */
  @keyframes blink { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }
  .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); display: inline-block; animation: blink 1.4s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Stats cards */
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .stat-change { font-size: 12px; font-weight: 600; margin-top: 8px; }
  .stat-change.up { color: var(--accent); }
  .stat-change.down { color: var(--red); }

  /* Table */
  .table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .table th { text-align: left; padding: 10px 12px; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-3); border-bottom: 2px solid var(--border); }
  .table td { padding: 10px 12px; border-bottom: 1px solid var(--border-light); }
  .table tr:hover td { background: #fafbfc; }

  /* Badge */
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; display: inline-block; }
  .badge-green { background: var(--accent-bg); color: var(--accent); }
  .badge-orange { background: var(--warn-bg); color: var(--warn); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-gray { background: var(--bg); color: var(--text-3); }

  /* Config sections */
  .config-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
  .config-section-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border-light); }
  .config-row { display: grid; grid-template-columns: 140px 1fr; gap: 8px; align-items: center; margin-bottom: 12px; }
  .config-label { font-size: 12px; font-weight: 500; color: var(--text-2); }

  /* ═══ MOBILE ═══ */
  @media (max-width: 768px) {
    .left-panel { display: none !important; }
    .chat-right { padding: 0 !important; }
    .chat-card { max-width: 100% !important; width: 100% !important; height: 100vh !important; max-height: 100vh !important; border-radius: 0 !important; box-shadow: none !important; border: none !important; }

// ══════════════════════════════════════
// SYSTEM PROMPT BUILDER
// ══════════════════════════════════════
function buildSystemPrompt(cfg) {
  return `You are ${cfg.assistant_name}, a hiring assistant that helps managers find the right talent quickly. You make the process simple — the manager describes what they need in plain language, and you handle the rest.

You are warm, professional, and efficient. You never use procurement jargon (no "SOW," "staff augmentation," "IC," or "VMS"). You speak the manager's language.

## Your Job
Conduct a short intake interview to understand what the manager needs, then gather enough detail to set up the role for them. Ask ONE question at a time. Keep messages to 1-3 sentences. Never explain the routing logic.

## Phase 1: Routing (determine where this request goes)

### Q1: Ask "Do you already know who you'd like to work with?"
- If YES → Path A (Fast Track)
- If NO → Path B (Discovery)

### Path A: Fast Track (Known Worker)
Q1b: "Great — what's their name?"

After the manager gives the name, the system will automatically search the talent pool. You will receive a system message with the search results. Based on the results:

**If workers are found:** Present the matches to the manager like: "I found [name(s)] in the talent pool. Is this who you're looking for?" List each match with their name and title if available. Let the manager confirm which one.

**If no workers found:** Say something like: "I couldn't find anyone by that name in the talent pool. Let me take you to the talent pool so you can search yourself." Then immediately output a special JSON to redirect them:
\`\`\`json
{"route":"worksome","confidence":"high","role_title":"Direct Hire","description":"Known worker — not found in talent pool","known_worker":true,"worker_name":"the name they gave","worker_found":false,"redirect":"talent_pool","headcount":1}
\`\`\`

**If worker confirmed:** Continue the direct hire flow:
Q1c: "Is this person replacing someone on your team, or are they coming in for a specific project?"
- PROJECT → Route decided: worksome → go to Phase 2
- REPLACE → Ask Q1d

Q1d: "Will you be managing their day-to-day work — setting tasks, supervising their schedule, directing how the work gets done?"
- YES (SDC present) → Route decided: vms → go to Phase 2
- NO (autonomous) → Route decided: worksome → go to Phase 2

Include the confirmed worker's details in the final JSON output (worker_name, worker_email if available, worker_id if provided by the system).

### Path B: Discovery Flow
Q2: "Tell me about the work you need done — what's the role or project?"
Q3: "Is this for a specific project with a defined deliverable, or do you need ongoing support for your team?" (weight: ${cfg.weights.deliverable_or_ongoing})
Q4: "How long do you expect this to last?" (weight: ${cfg.weights.duration})
Q5: "How many people do you need?" (weight: ${cfg.weights.headcount})

After Q5, if clear → route decided → go to Phase 2. If ambiguous → ask tiebreakers:
Q6: "Would you prefer to pay for specific deliverables or on an hourly/daily rate?" (weight: ${cfg.weights.payment_model})
Q7: "Will you be managing this person's day-to-day work?" (weight: ${cfg.weights.sdc})

## Knockout Signals (instant route, check every answer)
Route to VMS if: ${cfg.knockouts.vms.join(', ')} or 10+ identical roles
Route to Worksome if: ${cfg.knockouts.worksome.join(', ')}
After a knockout, still proceed to Phase 2 enrichment.

## Scoring
Deliverable/ongoing: wt ${cfg.weights.deliverable_or_ongoing} | Duration: wt ${cfg.weights.duration} | Headcount: wt ${cfg.weights.headcount} | Payment: wt ${cfg.weights.payment_model} | SDC: wt ${cfg.weights.sdc}
Route clear if one side ≥ 5. Ambiguous if diff ≤ 1 → ask tiebreakers.

## Phase 2: Enrichment (gather details to set up the role)

Once you know the route, transition with something like: "Great — I know exactly where to send this. Just a few more details so I can get everything set up for you."

Then ask these questions ONE AT A TIME. Skip any that were already clearly answered during Phase 1:

E1: "Can you give me a quick summary of what this person will be doing?" (if not already covered by Q2)
E2: "What skills or experience are most important for this role?"
E3: "Will this be remote, on-site, or hybrid?"
E4: "When do you need them to start?"
E5: "Do you have a budget or rate range in mind?" (if they say no or seem unsure, that's fine — just move on)

You do NOT need to ask all of these — skip any that were already answered. The goal is to collect enough to create a useful job listing. Once you have at least a description and skills, you can proceed to output.

## VMS Provider
The VMS for this client is: ${cfg.vms.name}

## Output
When you have the routing decision AND the enrichment details, respond with your confirmation message, then on a NEW LINE output EXACTLY this JSON block (the system will parse it):
\`\`\`json
{"route":"worksome_or_vms","confidence":"high_or_medium","role_title":"...","description":"A clear 2-3 sentence job description based on what the manager told you","skills":["skill1","skill2","skill3"],"known_worker":true_or_false,"worker_name":"...or_null","worker_email":"...or_null","worker_id":"...or_null","worker_found":true_or_false_or_null,"sdc_present":true_or_false_or_null,"headcount":1,"duration":"...","payment_model":"hourly_or_milestone_or_daily_or_unknown","location":"remote_or_onsite_or_hybrid","start_date":"...or_asap_or_null","budget":"...or_null"}
\`\`\`

## Rules
1. One question at a time. Never stack questions.
2. Keep messages to 1-3 sentences.
3. Never mention Worksome, ${cfg.vms.name}, SDC, scoring, or routing to the manager.
4. Never use procurement jargon.
5. Be conversational — like a helpful colleague, not a form.
6. When confirming the route, say: "Perfect — I've got everything I need. I'm setting this up for you now."
7. Do NOT output the JSON until Phase 2 is complete. The system needs the enrichment data to create the job.`;
}

// ══════════════════════════════════════
// CLAUDE API CALL
// ══════════════════════════════════════
async function callClaude(apiKey, systemPrompt, messages) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: systemPrompt,
      messages: messages.map(m => ({ role: m.role, content: m.text }))
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `API error: ${res.status}`);
  }
  const data = await res.json();
  return data.text;
}

// ══════════════════════════════════════
// QUICK-REPLY DETECTION
// ══════════════════════════════════════
function detectQuickReplies(text) {
  const t = text.toLowerCase();
  if (t.includes('already know who') || t.includes('know who you\'d like'))
    return ['Yes, I have someone in mind', 'No, I need to find someone'];
  if ((t.includes('replacing someone') || t.includes('replace someone')) && (t.includes('project') || t.includes('specific')))
    return ['Replacing someone on my team', 'Coming in for a specific project'];
  if (t.includes('managing their day-to-day') || t.includes('managing this person') || t.includes('supervising their schedule') || t.includes('directing how'))
    return ['Yes, I\'ll manage them directly', 'No, they\'ll work independently'];
  if ((t.includes('specific project') || t.includes('defined deliverable')) && (t.includes('ongoing support') || t.includes('ongoing')))
    return ['Specific project with a deliverable', 'Ongoing support for my team'];
  if (t.includes('prefer to pay') && (t.includes('deliverable') || t.includes('hourly')))
    return ['Pay for deliverables / milestones', 'Hourly or daily rate'];
  // Enrichment quick replies
  if (t.includes('remote') && t.includes('on-site') || t.includes('remote') && t.includes('hybrid'))
    return ['Remote', 'On-site', 'Hybrid'];
  if (t.includes('budget') && t.includes('rate') && t.includes('mind'))
    return ['I have a budget in mind', 'No specific budget yet'];
  return null;
}

              <div style={{display: 'flex', flexDirection: 'column', gap: 10}}>
                {recentThree.map((r, i) => (

// CHAT PAGE (split layout)
// ══════════════════════════════════════
function ChatPage({ config, setPage, page }) {
  const [messages, setMessages] = useState([]);
  const [apiMessages, setApiMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [routeResult, setRouteResult] = useState(null);
  const [handoffResult, setHandoffResult] = useState(null);
  const [handoffLoading, setHandoffLoading] = useState(false);
  const [started, setStarted] = useState(false);
  const [error, setError] = useState(null);
  const [quickReplies, setQuickReplies] = useState(null);
  const [waitingForWorkerName, setWaitingForWorkerName] = useState(false);
  const chatRef = useRef(null);
  const inputRef = useRef(null);

  const scrollBottom = () => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; };

  useEffect(() => { scrollBottom(); }, [messages, loading]);

  // Check if the last assistant message was asking for the worker's name
  const isAskingForName = (text) => {
    const t = text.toLowerCase();
    return t.includes("what's their name") || t.includes("what is their name") || t.includes("who is it") || t.includes("what's the person's name");
  };

  // Search Worksome talent pool
  const searchTalentPool = async (name) => {
    try {
      const res = await fetch(`/api/search-worker?name=${encodeURIComponent(name)}`);
      const data = await res.json();
      return data.workers || [];
    } catch { return []; }
  };

  const sendToAssistant = async (userText, allApiMsgs) => {
    // API key is managed server-side
    setLoading(true);
    setError(null);
    setQuickReplies(null);

    let msgsToSend = allApiMsgs;

    // If we were waiting for a worker name, search the talent pool first
    if (waitingForWorkerName && userText) {
      setWaitingForWorkerName(false);
      const workers = await searchTalentPool(userText);

      // Inject search results: add an assistant "ack" then a user "system" message to maintain alternating roles
      if (workers.length > 0) {
        const workerList = workers.map(w => `- ${w.name}${w.title ? ` (${w.title})` : ''}${w.email ? ` — ${w.email}` : ''} [ID: ${w.id}]`).join('\n');
        msgsToSend = [
          ...allApiMsgs,
          { role: 'assistant', text: `Let me check the talent pool for "${userText}"...` },
          { role: 'user', text: `[SYSTEM: Talent pool search results for "${userText}":\n${workerList}\nPresent these matches to the manager and ask them to confirm which worker.]` }
        ];
      } else {
        msgsToSend = [
          ...allApiMsgs,
          { role: 'assistant', text: `Let me check the talent pool for "${userText}"...` },
          { role: 'user', text: `[SYSTEM: Talent pool search for "${userText}" returned no results. Tell the manager you couldn't find them and redirect to the talent pool. Output the redirect JSON immediately.]` }
        ];
      }
    }

    try {
      const systemPrompt = buildSystemPrompt(config);
      const reply = await callClaude(config.api_key, systemPrompt, msgsToSend);

      const jsonMatch = reply.match(/```json\s*([\s\S]*?)```/);
      let cleanReply = reply;
      if (jsonMatch) {
        cleanReply = reply.replace(/```json[\s\S]*?```/, '').trim();
        try {
          const parsed = JSON.parse(jsonMatch[1]);
          setRouteResult(parsed);

          // Trigger Worksome handoff if routed there
          if (parsed.route === 'worksome') {
            setHandoffLoading(true);
            fetch('/api/handoff/worksome', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(parsed)
            })
              .then(r => r.json())
              .then(h => { setHandoffResult(h); setHandoffLoading(false); })
              .catch(() => setHandoffLoading(false));
          }
        } catch {}
      }

      setMessages(prev => [...prev, { role: 'assistant', text: cleanReply, time: new Date() }]);
      setApiMessages(prev => [...prev, { role: 'assistant', text: reply }]);

      if (!jsonMatch) {
        const qr = detectQuickReplies(cleanReply);
        if (qr) setQuickReplies(qr);

        // Detect if Claude is asking for the worker's name
        if (isAskingForName(cleanReply)) {
          setWaitingForWorkerName(true);
        }
      }
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  };

  const startConversation = () => {
    setStarted(true);
    setMessages([]);
    setApiMessages([]);
    setRouteResult(null);
    setError(null);

    const greeting = config.branding.greeting;
    const firstQ = "\n\nDo you already know who you'd like to work with?";
    const fullMsg = greeting + firstQ;
    setMessages([{ role: 'assistant', text: fullMsg, time: new Date() }]);
    setApiMessages([{ role: 'assistant', text: fullMsg }]);
    setQuickReplies(['Yes, I have someone in mind', 'No, I need to find someone']);
  };

  const handleSend = (overrideText) => {
    const text = (overrideText || input).trim();
    if (!text || loading || routeResult) return;
    setInput('');
    setQuickReplies(null);
    const newUserMsg = { role: 'user', text, time: new Date() };
    const newApiMsgs = [...apiMessages, { role: 'user', text }];
    setMessages(prev => [...prev, newUserMsg]);
    setApiMessages(newApiMsgs);
    sendToAssistant(text, newApiMsgs);
  };

  const resetChat = () => { setStarted(false); setMessages([]); setApiMessages([]); setRouteResult(null); setHandoffResult(null); setHandoffLoading(false); setError(null); setQuickReplies(null); setWaitingForWorkerName(false); };

  const now = (d) => d ? d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}) : '';

  return (
    <div style={{height: '100vh', display: 'flex'}}>
      {/* Left branding panel */}
      <LeftPanel config={config} setPage={setPage} onLogoClick={resetChat} />

      {/* Right side — chat window floating on background */}
      <div className="chat-right" style={{flex: 1, background: '#f4f4f5', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 32}}>
        <div className="chat-card" style={{width: '100%', maxWidth: 480, height: '88vh', maxHeight: 660, background: 'white', borderRadius: 20, boxShadow: '0 12px 48px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04)', display: 'flex', flexDirection: 'column', overflow: 'hidden', border: '1px solid rgba(0,0,0,0.06)'}}>

          {!started ? (
            <div className="chat-start" style={{flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '40px 36px'}}>
              <div style={{textAlign: 'center'}}>
                <div style={{width: 48, height: 48, background: '#1a1d23', borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, color: 'white', fontWeight: 700, margin: '0 auto 16px'}}>
                  {config.branding.logo_text}
                </div>
                <h2 style={{fontSize: 20, fontWeight: 700, marginBottom: 8}}>{config.assistant_name}</h2>
                <p style={{fontSize: 14, color: 'var(--text-2)', marginBottom: 28, lineHeight: 1.6}}>
                  Describe what you need and we'll get you set up with the right team or platform.
                </p>
                <button className="btn" style={{fontSize: 14, padding: '11px 28px', background: '#1a1d23', color: 'white', border: 'none', borderRadius: 8}} onClick={startConversation}>
                  Start a new request
                </button>
              </div>
            </div>
          ) : (
            <>
              {/* Chat header */}
              <div style={{padding: '14px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0}}>
                <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
                  <div style={{width: 26, height: 26, background: '#1a1d23', borderRadius: 7, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: 'white', fontWeight: 700, cursor: 'pointer'}} onClick={resetChat}>
                    {config.branding.logo_text}
                  </div>
                  <span style={{fontSize: 13, fontWeight: 600}}>
                    {routeResult ? `Routed → ${routeResult.route === 'worksome' ? 'Worksome' : config.vms.name}` : 'Intake in progress'}
                  </span>
                </div>
                <div style={{display: 'flex', gap: 4, alignItems: 'center'}}>
                  <button className="btn btn-sm btn-ghost" onClick={resetChat} style={{fontSize: 12}}>New</button>
                  <button className="btn btn-sm btn-ghost" onClick={() => setPage('analytics')} style={{fontSize: 12}}>📊</button>
                  <button className="btn btn-sm btn-ghost" onClick={() => setPage('config')} style={{fontSize: 12}}>⚙️</button>
                </div>
              </div>

              {/* Messages */}
              <div ref={chatRef} className="chat-messages" style={{flex: 1, overflowY: 'auto', padding: '18px 20px', display: 'flex', flexDirection: 'column', gap: 12}}>
                {messages.map((m, i) => (
                  <div key={i} className={`chat-msg ${m.role}`}>
                    <div className="chat-avatar" style={{background: m.role === 'assistant' ? '#1a1d23' : '#4a90d9', width: 28, height: 28, fontSize: 11}}>
                      {m.role === 'assistant' ? config.branding.logo_text : 'You'}
                    </div>
                    <div>
                      <div className="chat-bubble" style={{whiteSpace: 'pre-wrap'}}>{m.text}</div>
                      <div className="chat-time">{now(m.time)}</div>
                    </div>
                  </div>
                ))}

                {loading && (
                  <div className="chat-msg assistant">
                    <div className="chat-avatar" style={{background: '#1a1d23', width: 28, height: 28, fontSize: 11}}>{config.branding.logo_text}</div>
                    <div className="chat-bubble">
                      <span className="typing-dot"></span>{' '}
                      <span className="typing-dot"></span>{' '}
                      <span className="typing-dot"></span>
                    </div>
                  </div>
                )}

                {error && (
                  <div style={{background: 'var(--red-bg)', border: '1px solid var(--red)', borderRadius: 'var(--radius)', padding: '10px 14px', fontSize: 13, color: 'var(--red)'}}>
                    {error}
                  </div>
                )}

                {quickReplies && !loading && !routeResult && (
                  <div className="chat-options" style={{marginLeft: 38}}>
                    {quickReplies.map((qr, i) => (
                      <button key={i} className="chat-option" onClick={() => handleSend(qr)}>{qr}</button>
                    ))}
                  </div>
                )}

                {routeResult && (() => {
                  const isWorksome = routeResult.route === 'worksome';
                  const dest = isWorksome ? 'Worksome' : config.vms.name;
                  const color = isWorksome ? 'var(--accent)' : 'var(--warn)';

                  // Determine the best URL to link to
                  let destUrl = isWorksome ? config.worksome_url : config.vms.url;
                  if (isWorksome && handoffResult && handoffResult.job_url) {
                    destUrl = handoffResult.job_url;
                  }
                  // Worker not found — redirect to talent pool
                  const isRedirect = isWorksome && routeResult.worker_found === false;
                  if (isRedirect) {
                    destUrl = config.worksome_talent_pool_url || config.worksome_url;
                  }

                  return (
                    <div className={`route-card ${isWorksome ? 'worksome' : 'vms'}`}>
                      <div style={{fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, color, marginBottom: 4}}>
                        Routed → {dest}
                      </div>
                      <div style={{fontSize: 15, fontWeight: 600, marginBottom: 4}}>{routeResult.role_title || 'Role'}</div>
                      <div style={{fontSize: 13, color: 'var(--text-2)', marginBottom: 10, lineHeight: 1.5}}>
                        {isRedirect ? (
                          `Search the talent pool for ${routeResult.worker_name || 'your worker'}`
                        ) : (
                          <>Confidence: {routeResult.confidence} · {routeResult.known_worker ? 'Known worker' : 'Talent search'}{routeResult.headcount > 1 ? ` · ${routeResult.headcount} people` : ''}</>
                        )}
                      </div>

                      {isWorksome && handoffLoading && (
                        <div style={{fontSize: 12, color: 'var(--text-3)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6}}>
                          <span className="typing-dot"></span>
                          <span className="typing-dot"></span>
                          <span className="typing-dot"></span>
                          <span style={{marginLeft: 4}}>Creating draft job in Worksome...</span>
                        </div>
                      )}

                      {isWorksome && handoffResult && handoffResult.job_id && (
                        <div style={{fontSize: 12, color: 'var(--accent)', marginBottom: 8}}>
                          Draft job created in Worksome (ID: {handoffResult.job_id})
                          {handoffResult.worker_invited && handoffResult.worker_name && (
                            <span> · {handoffResult.worker_name} invited to talent pool</span>
                          )}
                        </div>
                      )}

                      <a href={destUrl}
                        target="_blank" rel="noopener"
                        style={{display: 'inline-block', padding: '8px 18px', borderRadius: 'var(--radius)', fontSize: 13, fontWeight: 600, color: 'white', textDecoration: 'none', background: color}}>
                        {isRedirect ? 'Search talent pool →' : `Continue in ${dest} →`}
                      </a>
                    </div>
                  );
                })()}
              </div>

              {/* Input bar */}
              {!routeResult && (
                <div className="chat-input-bar" style={{padding: '12px 20px', borderTop: '1px solid var(--border)', display: 'flex', gap: 8, flexShrink: 0}}>
                  <input ref={inputRef} className="input" placeholder="Or type your answer..." value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleSend()}
                    disabled={loading} style={{borderRadius: 8}} />
                  <button className="btn btn-primary" onClick={() => handleSend()} disabled={loading || !input.trim()} style={{borderRadius: 8}}>Send</button>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

          <input className="input" value={config.vms.url} onChange={e => updateVms('url', e.target.value)} />
        </div>
        <div className="config-row">
          <div className="config-label">Worksome URL</div>
          <input className="input" value={config.worksome_url} onChange={e => updateConfig({ worksome_url: e.target.value })} />
        </div>
      </div>

      {/* Weights */}
      <div className="config-section">
        <div className="config-section-title">Signal Weights</div>
        {Object.entries(config.weights).map(([k, v]) => (
          <div className="config-row" key={k}>
            <div className="config-label">{k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</div>
            <input className="input" type="number" min="0" max="5" value={v} style={{width: 70}}

          </div>
        ))}
      </div>

      {/* Knockouts */}
      <div className="config-section">
        <div className="config-section-title">Knockout Signals</div>
        <div className="config-row" style={{alignItems: 'start'}}>
          <div className="config-label" style={{marginTop: 8}}>→ VMS</div>
          <textarea className="input" rows={2} value={config.knockouts.vms.join(', ')}
            onChange={e => updateConfig({ knockouts: {...config.knockouts, vms: e.target.value.split(',').map(s => s.trim()).filter(Boolean)} })} />
        </div>
        <div className="config-row" style={{alignItems: 'start'}}>
          <div className="config-label" style={{marginTop: 8}}>→ Worksome</div>
          <textarea className="input" rows={2} value={config.knockouts.worksome.join(', ')}
            onChange={e => updateConfig({ knockouts: {...config.knockouts, worksome: e.target.value.split(',').map(s => s.trim()).filter(Boolean)} })} />
        </div>
      </div>

      {/* Approval Gates */}
      <div className="config-section">
        <div className="config-section-title">Approval Gates</div>
        {config.approval_gates.map((g, i) => (
          <div key={i} style={{display: 'flex', gap: 8, marginBottom: 8, alignItems: 'center'}}>
            <span style={{fontSize: 12, color: 'var(--text-3)', whiteSpace: 'nowrap'}}>If</span>
            <input className="input input-sm" value={g.condition}
              onChange={e => { const gates = [...config.approval_gates]; gates[i] = {...g, condition: e.target.value}; updateConfig({ approval_gates: gates }); }} />
            <span style={{fontSize: 12, color: 'var(--text-3)', whiteSpace: 'nowrap'}}>→</span>
            <input className="input input-sm" value={g.action}
              onChange={e => { const gates = [...config.approval_gates]; gates[i] = {...g, action: e.target.value}; updateConfig({ approval_gates: gates }); }} />
            <button className="btn btn-sm btn-danger" onClick={() => { const gates = config.approval_gates.filter((_, j) => j !== i); updateConfig({ approval_gates: gates }); }}>×</button>
          </div>
        ))}
        <button className="btn btn-sm" onClick={() => updateConfig({ approval_gates: [...config.approval_gates, { condition: '', action: '' }] })}>
          + Add gate
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════
// SVG CHART HELPERS
// ══════════════════════════════════════
function SvgBarChart({ data, barKeys, colors, labels, height = 220 }) {
  const maxVal = Math.max(...data.flatMap(d => barKeys.map(k => d[k])));
  const w = 500, h = height - 40, pad = { top: 10, right: 20, bottom: 30, left: 35 };
  const plotW = w - pad.left - pad.right, plotH = h - pad.top - pad.bottom;
  const groupW = plotW / data.length;
  const barW = Math.min(groupW * 0.35, 28);
  const yTicks = [0, Math.round(maxVal / 2), maxVal];

  return (
    <div>
      <svg viewBox={`0 0 ${w} ${h}`} style={{width: '100%', height: height - 20}}>
        {yTicks.map(t => {
          const y = pad.top + plotH - (t / maxVal) * plotH;
          return <g key={t}><line x1={pad.left} y1={y} x2={w - pad.right} y2={y} stroke="#e2e5ea" strokeDasharray="3 3" /><text x={pad.left - 6} y={y + 4} textAnchor="end" fontSize="11" fill="#9ba3b0">{t}</text></g>;
        })}
        {data.map((d, i) => {
          const cx = pad.left + groupW * i + groupW / 2;
          return (
            <g key={i}>
              <text x={cx} y={h - 6} textAnchor="middle" fontSize="11" fill="#9ba3b0">{d.week}</text>
              {barKeys.map((k, ki) => {
                const bh = (d[k] / maxVal) * plotH;
                const bx = cx - barKeys.length * barW / 2 + ki * (barW + 2);
                return <rect key={k} x={bx} y={pad.top + plotH - bh} width={barW} height={bh} rx="3" fill={colors[ki]} />;
              })}
            </g>
          );
        })}
      </svg>
      <div style={{display: 'flex', gap: 16, justifyContent: 'center'}}>
        {barKeys.map((k, i) => (
          <div key={k} style={{display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: '#5f6776'}}>
            <div style={{width: 10, height: 10, borderRadius: 2, background: colors[i]}} />
            {labels[i]}
          </div>
        ))}
      </div>
    </div>
  );
}

function SvgDonut({ slices, size = 160 }) {
  const total = slices.reduce((a, s) => a + s.value, 0);
  const r = 55, ir = 35, cx = size / 2, cy = size / 2;
  let cum = 0;
  const paths = slices.map((s, i) => {
    const frac = s.value / total;
    const startAngle = cum * 2 * Math.PI - Math.PI / 2;
    cum += frac;
    const endAngle = cum * 2 * Math.PI - Math.PI / 2;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const ix1 = cx + ir * Math.cos(endAngle), iy1 = cy + ir * Math.sin(endAngle);
    const ix2 = cx + ir * Math.cos(startAngle), iy2 = cy + ir * Math.sin(startAngle);
    const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${ir} ${ir} 0 ${large} 0 ${ix2} ${iy2} Z`;
    return <path key={i} d={d} fill={s.color} />;
  });

  return (
    <div style={{textAlign: 'center'}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{paths}</svg>
      <div style={{display: 'flex', gap: 16, justifyContent: 'center', marginTop: 8}}>
        {slices.map((s, i) => (
          <div key={i} style={{display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: '#5f6776'}}>
            <div style={{width: 10, height: 10, borderRadius: 2, background: s.color}} />
            {s.label} ({s.value})
          </div>
        ))}
      </div>
    </div>
  );
}

function SvgLineChart({ data, dataKey, height = 180 }) {
  const vals = data.map(d => d[dataKey]);
  const maxVal = Math.max(...vals), minVal = Math.min(...vals);
  const range = maxVal - minVal || 1;
  const w = 500, h = height - 30, pad = { top: 10, right: 20, bottom: 30, left: 35 };
  const plotW = w - pad.left - pad.right, plotH = h - pad.top - pad.bottom;
  const points = data.map((d, i) => ({
    x: pad.left + (i / (data.length - 1)) * plotW,
    y: pad.top + plotH - ((d[dataKey] - minVal) / range) * plotH
  }));
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const yTicks = [minVal, Math.round((minVal + maxVal) / 2), maxVal];

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width: '100%', height: height}}>
      {yTicks.map(t => {
        const y = pad.top + plotH - ((t - minVal) / range) * plotH;
        return <g key={t}><line x1={pad.left} y1={y} x2={w - pad.right} y2={y} stroke="#e2e5ea" strokeDasharray="3 3" /><text x={pad.left - 6} y={y + 4} textAnchor="end" fontSize="11" fill="#9ba3b0">{t}</text></g>;
      })}
      {data.map((d, i) => (
        <text key={i} x={points[i].x} y={h - 4} textAnchor="middle" fontSize="11" fill="#9ba3b0">{d.week}</text>
      ))}
      <path d={linePath} fill="none" stroke="#6b3fa0" strokeWidth="2" />
      {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="4" fill="#6b3fa0" />)}
    </svg>
  );
}
