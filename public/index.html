// ══════════════════════════════════════
// SYSTEM PROMPT BUILDER
// ══════════════════════════════════════
function buildSystemPrompt(cfg) {
  return `You are ${cfg.assistant_name}, a hiring assistant that helps managers find the right talent quickly. You make the process simple — the manager describes what they need in plain language, and you handle the rest.

You are warm, professional, and efficient. You never use procurement jargon (no "SOW," "staff augmentation," "IC," or "VMS"). You speak the manager's language.

## Your Job
Short intake interview → route the request → gather just enough detail. Ask ONE question at a time. Keep messages to 1-3 sentences. Never explain routing logic.

## The Conversation

### Q1: "Do you already know who you'd like to work with?"
- YES → Path A
- NO → Path B

---

## Path A: I have someone in mind

Q1b: "Great — have you worked with this person through us before?"
- YES → **A1** (search talent pool)
- NO → **A2** (new worker)

### A1: Existing worker
Q1c: "What's their name?"
The system searches the talent pool automatically. You'll get a system message with results.

- **Found:** Show matches (name + title). Ask: "Is this who you're looking for?"
- **Not found:** "I couldn't find them — let me get them set up instead." → switch to A2.
- **Confirmed:** Ask Q1d (below), then output JSON immediately. No enrichment needed — the hire page handles the rest.

### A2: New worker
"No problem — let me grab a few details."
Ask ONE AT A TIME:
1. "What's their first name?"
2. "And their last name?"
3. "What's the best email to reach them?"

That's it for details — then ask Q1d. Skip country/skills for now; the manager can add those later.

### Q1d (shared by A1 + A2): "Is this person coming in for a specific project, or are they replacing someone on your team?"
- PROJECT → route: worksome. Output JSON.
- REPLACE → route: vms. Output JSON.

For both A1 and A2: after Q1d, you're done. Say "Perfect — I'm setting this up for you now." and output the JSON. No enrichment questions.

---

## Path B: I need to find someone

Q1b_discovery: "Would you like me to help you create a project brief and find the right talent, or would you prefer to just describe the role?"
- CREATE PROJECT → **B1**
- DESCRIBE ROLE → **B2**

### B1: AI Project Brief + Talent Match
Q_project: "Tell me what you need this person to do — what's the project or deliverable?"

After the manager describes what they need, do TWO things in your response:

1. **Generate a short, professional project description** (2-4 sentences) that could be used as a job brief. Show it to the manager: "Here's a project brief based on what you've described:" followed by the description.

2. **Extract the key skills** needed for this project and output them on a new line in this exact format:
\`[TALENT_SEARCH: skill1, skill2, skill3]\`

For example: \`[TALENT_SEARCH: UX Design, React, User Research]\`

The system will automatically search the talent pool and return matching workers with their skills. You'll receive a system message with results.

**When results arrive**, score each worker out of 10 based on how well their skills and experience match the project requirements. Present results like:

"Here's who I found in your talent pool:"
- **[Name]** — [Title] · Skills: [their skills] · **Match: 8/10** — [brief reason why they're a good/okay fit]
- **[Name]** — [Title] · Skills: [their skills] · **Match: 6/10** — [reason]

Then ask: "Would you like to hire one of these people?"

- Pick someone → Ask Q1d. Then output JSON. Done.
- None fit → "No problem — let me set up the role so we can find someone new." → Go to B2 Q3 onward (skip Q2, we already have the project description and skills).

**If no workers found:** "I didn't find anyone with those skills in your talent pool yet. Let me set up the role." → Go to B2 Q3 onward.

### B2: Full discovery
Ask these in order, ONE AT A TIME. Skip any already answered:

Q2: "Tell me about the work you need done — what's the role or project?"
Q3: "Is this for a specific project with a deliverable, or ongoing support?" (weight: ${cfg.weights.deliverable_or_ongoing})
Q4: "How long do you expect this to last?" (weight: ${cfg.weights.duration})
Q5: "How many people do you need?" (weight: ${cfg.weights.headcount})

If route is clear after Q5 → go to Enrichment.
If ambiguous (scores within 1 point) → ask tiebreakers:
Q6: "Would you prefer to pay for specific deliverables or on an hourly/daily rate?" (weight: ${cfg.weights.payment_model})
Q7: "Will you be managing this person's day-to-day work?" (weight: ${cfg.weights.sdc})

### Enrichment (B2 only)
"Great — I know exactly where to send this. Just a couple more details."

Ask ONE AT A TIME, but ONLY what's missing. Skip anything already covered:
E1: "Can you give me a quick summary of what this person will be doing?" (skip if Q2 covered it)
E2: "What skills or experience are most important?" (SKIP if skills were provided in B1 or anywhere else)
E3: "Will this be remote, on-site, or hybrid?"

That's it. You do NOT need to ask about budget — keep it short. Once you have a description and skills, output JSON.

---

## Routing Logic

### Knockout signals (instant route — check every answer)
VMS if: ${cfg.knockouts.vms.join(', ')} or 10+ identical roles
Worksome if: ${cfg.knockouts.worksome.join(', ')}
After a knockout, still ask remaining enrichment questions.

### Scoring (B2 only)
Deliverable/ongoing: wt ${cfg.weights.deliverable_or_ongoing} | Duration: wt ${cfg.weights.duration} | Headcount: wt ${cfg.weights.headcount} | Payment: wt ${cfg.weights.payment_model} | SDC: wt ${cfg.weights.sdc}
Route clear if one side ≥ 5. Ambiguous if diff ≤ 1.

VMS provider: ${cfg.vms.name}

---

## Output
When ready, say your confirmation, then on a NEW LINE output EXACTLY:
\`\`\`json
{"route":"worksome_or_vms","confidence":"high_or_medium","role_title":"...","description":"2-3 sentence job description","skills":["skill1","skill2"],"known_worker":true_or_false,"worker_name":"...or_null","worker_first_name":"...or_null","worker_last_name":"...or_null","worker_email":"...or_null","worker_id":"...or_null","worker_found":true_or_false_or_null,"worker_country":"...or_null","worker_skills":["skill1","skill2"],"sdc_present":true_or_false_or_null,"headcount":1,"duration":"...","payment_model":"hourly_or_milestone_or_daily_or_unknown","location":"remote_or_onsite_or_hybrid","budget":"...or_null"}
\`\`\`

For fast-track paths (A1, A2, B1-pick), it's fine if some fields are null — output what you have.

## Rules
1. ONE question at a time. Never stack.
2. 1-3 sentences max per message.
3. Never mention Worksome, ${cfg.vms.name}, SDC, scoring, or routing.
4. No procurement jargon.
5. Be conversational — like a helpful colleague, not a form.
6. Fast-track paths (A1, A2, B1-pick) should feel like 3-4 messages total. Don't pad them with extra questions.`;
}

// CLAUDE API CALL
// ══════════════════════════════════════
async function callClaude(apiKey, systemPrompt, messages) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system: systemPrompt,
      messages: messages.map(m => ({ role: m.role, content: m.text }))
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `API error: ${res.status}`);
  }
  const data = await res.json();
  return data.text;
}

// ══════════════════════════════════════
// QUICK-REPLY DETECTION
// ══════════════════════════════════════
function detectQuickReplies(text) {
  const t = text.toLowerCase();
  if (t.includes('already know who') || t.includes('know who you\'d like'))
    return ['Yes, I have someone in mind', 'No, I need to find someone'];
  if (t.includes('worked with') && (t.includes('before') || t.includes('through us')))
    return ['Yes, they\'ve worked with us before', 'No, they\'re new'];
  if ((t.includes('replacing someone') || t.includes('replace someone')) && (t.includes('project') || t.includes('specific')))
    return ['Replacing someone on my team', 'Coming in for a specific project'];
  if (t.includes('managing their day-to-day') || t.includes('managing this person') || t.includes('supervising their schedule') || t.includes('directing how'))
    return ['Yes, I\'ll manage them directly', 'No, they\'ll work independently'];
  if ((t.includes('project brief') || t.includes('find the right talent') || t.includes('create a project')) && (t.includes('describe the role') || t.includes('just describe')))
    return ['Create a project brief and find talent', 'I\'ll just describe the role'];
  if ((t.includes('specific project') || t.includes('defined deliverable')) && (t.includes('ongoing support') || t.includes('ongoing')))
    return ['Specific project with a deliverable', 'Ongoing support for my team'];
  if (t.includes('prefer to pay') && (t.includes('deliverable') || t.includes('hourly')))
    return ['Pay for deliverables / milestones', 'Hourly or daily rate'];
  // Enrichment quick replies
  if (t.includes('remote') && t.includes('on-site') || t.includes('remote') && t.includes('hybrid'))
    return ['Remote', 'On-site', 'Hybrid'];
  if (t.includes('budget') && t.includes('rate') && t.includes('mind'))
    return ['I have a budget in mind', 'No specific budget yet'];
  return null;
}

  const vmsCount = mockRequests.filter(r => r.route === 'vms').length;
  const avgSec = Math.round(mockRequests.reduce((a, r) => a + parseInt(r.duration), 0) / mockRequests.length);
  const recentThree = mockRequests.slice(0, 3);
  const hasHero = config.branding.hero_image_url && config.branding.hero_image_url.trim();
  const hasLogo = config.branding.logo_url && config.branding.logo_url.trim();

  const headline = config.branding.headline || `Welcome back to\n${config.assistant_name}`;
  const subheadline = config.branding.subheadline || 'Your single front door for hiring. Describe what you need and we\'ll route you to the right place.';

  return (
    <div className="left-panel" style={{width: '42%', minWidth: 360, background: '#18181b', display: 'flex', flexDirection: 'column', justifyContent: 'center', padding: '36px 44px', position: 'relative', overflow: 'hidden'}}>
      {/* Subtle gradient overlay */}
      <div style={{position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, background: 'radial-gradient(ellipse at 20% 0%, rgba(107,63,160,0.15) 0%, transparent 60%)', pointerEvents: 'none'}} />

      {/* Logo + nav */}
      <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'absolute', top: 36, left: 44, right: 44, zIndex: 1}}>
        <div style={{display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer'}} onClick={onLogoClick}>
          {hasLogo ? (
            <img src={config.branding.logo_url} alt={config.client_name} style={{height: 28, objectFit: 'contain'}} />
          ) : (
            <>
              <div style={{width: 30, height: 30, background: 'white', borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15, color: '#18181b', fontWeight: 800}}>
                {config.branding.logo_text}
              </div>
              <span style={{fontSize: 15, fontWeight: 700, color: 'white', letterSpacing: -0.3}}>{config.client_name || 'worksome'}</span>
            </>
          )}
        </div>
        <div style={{display: 'flex', gap: 2}}>
          <button className="btn btn-ghost btn-sm" style={{color: 'rgba(255,255,255,0.5)', fontSize: 12}} onClick={() => setPage('analytics')}>Analytics</button>
          <button className="btn btn-ghost btn-sm" style={{color: 'rgba(255,255,255,0.5)', fontSize: 12}} onClick={() => setPage('config')}>Settings</button>
        </div>
      </div>

      {/* Headline */}
      <div style={{position: 'relative', zIndex: 1}}>
        <h1 style={{fontSize: 32, fontWeight: 700, lineHeight: 1.15, marginBottom: 14, color: 'white', letterSpacing: -0.5, whiteSpace: 'pre-line'}}>
          {headline}
        </h1>
        <p style={{fontSize: 15, color: 'rgba(255,255,255,0.55)', lineHeight: 1.65, marginBottom: 36, maxWidth: 340}}>
          {subheadline}
        </p>
      </div>

      {/* Hero image OR data cards */}
      <div style={{position: 'relative', zIndex: 1}}>
        {hasHero ? (
          <div style={{display: 'flex', flexDirection: 'column', gap: 14}}>
            <img src={config.branding.hero_image_url} alt="Hero"
              style={{width: '100%', maxWidth: 360, borderRadius: 14, boxShadow: '0 8px 30px rgba(0,0,0,0.3)', objectFit: 'cover'}} />
          </div>
        ) : (
          <div style={{display: 'flex', flexDirection: 'column', gap: 12, maxWidth: 320}}>
            {/* Recent requests card */}
            <div style={{background: 'rgba(255,255,255,0.07)', borderRadius: 12, padding: '16px 18px', border: '1px solid rgba(255,255,255,0.08)'}}>
              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14}}>
                <span style={{fontSize: 12, fontWeight: 600, color: 'rgba(255,255,255,0.7)', textTransform: 'uppercase', letterSpacing: 0.5}}>Recent requests</span>
                <span style={{fontSize: 12, color: '#a78bfa', fontWeight: 600}}>{mockRequests.length} total</span>
              </div>
              <div style={{display: 'flex', flexDirection: 'column', gap: 10}}>
                {recentThree.map((r, i) => (
                  <div key={i} style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
                    <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
                      <div style={{width: 26, height: 26, borderRadius: '50%', background: 'rgba(255,255,255,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 600, color: 'rgba(255,255,255,0.6)'}}>{r.role[0]}</div>
                      <span style={{fontSize: 13, color: 'rgba(255,255,255,0.85)'}}>{r.role}</span>
                    </div>
                    <span style={{fontSize: 10, fontWeight: 600, padding: '2px 8px', borderRadius: 10,
                      background: r.route === 'worksome' ? 'rgba(167,139,250,0.2)' : 'rgba(251,191,36,0.2)',
                      color: r.route === 'worksome' ? '#c4b5fd' : '#fbbf24'}}>
                      {r.route === 'worksome' ? 'Worksome' : config.vms.name}
                    </span>
                  </div>
                ))}
              </div>
            </div>

            {/* Stats row */}
            <div style={{display: 'flex', gap: 10}}>
              {[
                { value: worksomeCount, label: 'Worksome', color: '#a78bfa' },
                { value: vmsCount, label: config.vms.name, color: '#fbbf24' },
                { value: avgSec + 's', label: 'Avg. time', color: 'white' }
              ].map((s, i) => (
                <div key={i} style={{flex: 1, background: 'rgba(255,255,255,0.07)', borderRadius: 10, padding: '12px 10px', border: '1px solid rgba(255,255,255,0.08)', textAlign: 'center'}}>
                  <div style={{fontSize: 20, fontWeight: 700, color: s.color}}>{s.value}</div>
                  <div style={{fontSize: 10, color: 'rgba(255,255,255,0.4)', marginTop: 3, textTransform: 'uppercase', letterSpacing: 0.3}}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Watermark */}
      <div style={{position: 'absolute', bottom: 36, left: 44, fontSize: 12, color: 'rgba(255,255,255,0.2)', zIndex: 1}}>
        Powered by Front Door
      </div>
    </div>
  );
}

// CHAT PAGE (split layout)
// ══════════════════════════════════════
function ChatPage({ config, setPage, page }) {
  const [messages, setMessages] = useState([]);
  const [apiMessages, setApiMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [routeResult, setRouteResult] = useState(null);
  const [handoffResult, setHandoffResult] = useState(null);
  const [handoffLoading, setHandoffLoading] = useState(false);
  const [started, setStarted] = useState(false);
  const [error, setError] = useState(null);
  const [quickReplies, setQuickReplies] = useState(null);
  const [waitingForWorkerName, setWaitingForWorkerName] = useState(false);
  const [foundWorkers, setFoundWorkers] = useState([]);
  const [listening, setListening] = useState(false);
  const chatRef = useRef(null);
  const inputRef = useRef(null);
  const recognitionRef = useRef(null);

  const scrollBottom = () => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; };

  useEffect(() => { scrollBottom(); }, [messages, loading]);

  // Speech recognition setup
  const startListening = () => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Speech recognition is not supported in this browser.'); return; }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = true;
    recognition.continuous = false;
    recognitionRef.current = recognition;

    recognition.onstart = () => setListening(true);
    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
      setInput(transcript);
    };
    recognition.onend = () => { setListening(false); recognitionRef.current = null; };
    recognition.onerror = () => { setListening(false); recognitionRef.current = null; };

    recognition.start();
  };

  const stopListening = () => {
    if (recognitionRef.current) { recognitionRef.current.stop(); }
  };

  // Check if the last assistant message was asking for the worker's name
  const isAskingForName = (text) => {
    const t = text.toLowerCase();
    return t.includes("what's their name") || t.includes("what is their name") || t.includes("who is it") || t.includes("what's the person's name");
  };

  // Search Worksome talent pool by name
  const searchTalentPool = async (name) => {
    try {
      const res = await fetch(`/api/search-worker?name=${encodeURIComponent(name)}`);
      const data = await res.json();
      return data.workers || [];
    } catch { return []; }
  };

  // Search Worksome talent pool by skills
  const searchTalentPoolBySkills = async (skillsText) => {
    try {
      const res = await fetch(`/api/search-skills?skills=${encodeURIComponent(skillsText)}`);
      const data = await res.json();
      return data;
    } catch { return { workers: [], resolvedSkills: [] }; }
  };

  const sendToAssistant = async (userText, allApiMsgs) => {
    // API key is managed server-side
    setLoading(true);
    setError(null);
    setQuickReplies(null);

    let msgsToSend = allApiMsgs;

    // If we were waiting for a worker name, search the talent pool first
    if (waitingForWorkerName && userText) {
      setWaitingForWorkerName(false);
      const workers = await searchTalentPool(userText);

      // Inject search results: add an assistant "ack" then a user "system" message to maintain alternating roles
      if (workers.length > 0) {
        setFoundWorkers(workers); // Store for handoff
        const workerList = workers.map(w => `- ${w.name}${w.title ? ` (${w.title})` : ''}${w.email ? ` — ${w.email}` : ''} [ID: ${w.id}]`).join('\n');
        msgsToSend = [
          ...allApiMsgs,
          { role: 'assistant', text: `Let me check the talent pool for "${userText}"...` },
          { role: 'user', text: `[SYSTEM: Talent pool search results for "${userText}":\n${workerList}\nPresent these matches to the manager and ask them to confirm which worker. IMPORTANT: When outputting the final JSON, you MUST include the worker's ID exactly as shown above in the worker_id field.]` }
        ];
      } else {
        msgsToSend = [
          ...allApiMsgs,
          { role: 'assistant', text: `Let me check the talent pool for "${userText}"...` },
          { role: 'user', text: `[SYSTEM: Talent pool search for "${userText}" returned no results. Tell the manager you couldn't find them but you can get them set up. Ask for their first name to start collecting details (first name, last name, email, country, skills) — one question at a time.]` }
        ];
      }
    }

    try {
      const systemPrompt = buildSystemPrompt(config);
      const reply = await callClaude(config.api_key, systemPrompt, msgsToSend);

      const jsonMatch = reply.match(/```json\s*([\s\S]*?)```/);
      let cleanReply = reply;
      if (jsonMatch) {
        cleanReply = reply.replace(/```json[\s\S]*?```/, '').trim();
        try {
          const parsed = JSON.parse(jsonMatch[1]);

          // Inject worker_id from search results if Claude didn't include it
          if (parsed.known_worker && !parsed.worker_id && foundWorkers.length > 0) {
            // Try to match by name
            const match = foundWorkers.find(w =>
              parsed.worker_name && w.name && w.name.toLowerCase().includes(parsed.worker_name.toLowerCase())
            ) || foundWorkers[0];
            if (match) {
              parsed.worker_id = match.id;
              parsed.worker_email = parsed.worker_email || match.email;
              console.log('[Front Door] Injected worker_id from search:', match.id);
            }
          }

          setRouteResult(parsed);

          // Trigger Worksome handoff if routed there
          if (parsed.route === 'worksome') {
            setHandoffLoading(true);
            fetch('/api/handoff/worksome', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(parsed)
            })
              .then(r => r.json())
              .then(h => { setHandoffResult(h); setHandoffLoading(false); })
              .catch(() => setHandoffLoading(false));
          }
        } catch {}
      }

      // Check for [TALENT_SEARCH: ...] marker — auto-search talent pool
      const talentSearchMatch = reply.match(/\[TALENT_SEARCH:\s*([^\]]+)\]/);
      if (talentSearchMatch && !jsonMatch) {
        const skillsText = talentSearchMatch[1].trim();
        const displayReply = reply.replace(/\[TALENT_SEARCH:[^\]]+\]/, '').trim();

        // Show the project description part immediately
        setMessages(prev => [...prev, { role: 'assistant', text: displayReply, time: new Date() }]);
        // Add a searching indicator
        setMessages(prev => [...prev, { role: 'assistant', text: '🔍 Searching your talent pool...', time: new Date(), isSearching: true }]);

        // Search the talent pool by the extracted skills
        const result = await searchTalentPoolBySkills(skillsText);
        const workers = result.workers || [];
        const resolved = result.resolvedSkills || [];
        const skillSummary = resolved.map(s => s.name).join(', ') || skillsText;

        // Remove the searching indicator
        setMessages(prev => prev.filter(m => !m.isSearching));

        // Build the follow-up Claude call with results
        const updatedApiMsgs = [...msgsToSend, { role: 'assistant', text: reply }];
        let followUpMsgs;

        if (workers.length > 0) {
          setFoundWorkers(workers);
          const workerList = workers.map(w =>
            `- ${w.name}${w.title ? ` (${w.title})` : ''}${w.email ? ` — ${w.email}` : ''}${w.skills && w.skills.length > 0 ? ` | Skills: ${w.skills.join(', ')}` : ''} [ID: ${w.id}]`
          ).join('\n');
          followUpMsgs = [
            ...updatedApiMsgs,
            { role: 'user', text: `[SYSTEM: Talent pool search for skills "${skillSummary}" found these workers:\n${workerList}\n\nScore each worker out of 10 based on how well their skills and title match the project requirements you just described. Present results as a ranked list with name, title, skills, score out of 10, and a brief reason. Then ask if the manager wants to hire one of them. IMPORTANT: Include the worker's ID in worker_id in the final JSON if they pick someone.]` }
          ];
        } else {
          followUpMsgs = [
            ...updatedApiMsgs,
            { role: 'user', text: `[SYSTEM: Talent pool search for skills "${skillSummary}" found no matches. Tell the manager you didn't find anyone with those skills in their talent pool yet. Offer to set up the role so they can find the right person. Continue to Path B2 Q3 onward — you already have the project description and skills.]` }
          ];
        }

        // Second Claude call with results
        const followUpReply = await callClaude(config.api_key, buildSystemPrompt(config), followUpMsgs);
        const followUpJson = followUpReply.match(/```json\s*([\s\S]*?)```/);
        let followUpClean = followUpReply;

        if (followUpJson) {
          followUpClean = followUpReply.replace(/```json[\s\S]*?```/, '').trim();
          try {
            const parsed = JSON.parse(followUpJson[1]);
            if (parsed.known_worker && !parsed.worker_id && foundWorkers.length > 0) {
              const match = foundWorkers.find(w =>
                parsed.worker_name && w.name && w.name.toLowerCase().includes(parsed.worker_name.toLowerCase())
              ) || foundWorkers[0];
              if (match) {
                parsed.worker_id = match.id;
                parsed.worker_email = parsed.worker_email || match.email;
              }
            }
            setRouteResult(parsed);
            if (parsed.route === 'worksome') {
              setHandoffLoading(true);
              fetch('/api/handoff/worksome', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(parsed) })
                .then(r => r.json()).then(h => { setHandoffResult(h); setHandoffLoading(false); }).catch(() => setHandoffLoading(false));
            }
          } catch {}
        }

        setMessages(prev => [...prev.filter(m => !m.isSearching), { role: 'assistant', text: followUpClean, time: new Date() }]);
        setApiMessages(prev => [...prev, { role: 'assistant', text: reply }, { role: 'user', text: followUpMsgs[followUpMsgs.length - 1].text }, { role: 'assistant', text: followUpReply }]);

        if (!followUpJson) {
          const qr = detectQuickReplies(followUpClean);
          if (qr) setQuickReplies(qr);
        }
      } else {
        // Normal flow — no talent search marker
        setMessages(prev => [...prev, { role: 'assistant', text: cleanReply, time: new Date() }]);
        setApiMessages(prev => [...prev, { role: 'assistant', text: reply }]);

        if (!jsonMatch) {
          const qr = detectQuickReplies(cleanReply);
          if (qr) setQuickReplies(qr);

          // Detect if Claude is asking for the worker's name
          if (isAskingForName(cleanReply)) {
            setWaitingForWorkerName(true);
          }
          // Detect if Claude is asking for skills to search talent pool
          if (isAskingForSkills(cleanReply)) {
            setWaitingForSkillSearch(true);
          }
        }
      }
    } catch (err) {
      setError(err.message);
    }
    setLoading(false);
  };

  const startConversation = () => {
    setStarted(true);
    setMessages([]);
    setApiMessages([]);
    setRouteResult(null);
    setError(null);

    const greeting = config.branding.greeting;
    const firstQ = "\n\nDo you already know who you'd like to work with?";
    const fullMsg = greeting + firstQ;
    setMessages([{ role: 'assistant', text: fullMsg, time: new Date() }]);
    setApiMessages([{ role: 'assistant', text: fullMsg }]);
    setQuickReplies(['Yes, I have someone in mind', 'No, I need to find someone']);
  };

  const handleSend = (overrideText) => {
    const text = (overrideText || input).trim();
    if (!text || loading || routeResult) return;
    setInput('');
    setQuickReplies(null);
    const newUserMsg = { role: 'user', text, time: new Date() };
    const newApiMsgs = [...apiMessages, { role: 'user', text }];
    setMessages(prev => [...prev, newUserMsg]);
    setApiMessages(newApiMsgs);
    sendToAssistant(text, newApiMsgs);
  };

  const resetChat = () => { setStarted(false); setMessages([]); setApiMessages([]); setRouteResult(null); setHandoffResult(null); setHandoffLoading(false); setError(null); setQuickReplies(null); setWaitingForWorkerName(false); setListening(false); setFoundWorkers([]); if (recognitionRef.current) recognitionRef.current.stop(); };

  const now = (d) => d ? d.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}) : '';

  return (
    <div style={{height: '100vh', display: 'flex'}}>
      {/* Left branding panel */}
      <LeftPanel config={config} setPage={setPage} onLogoClick={resetChat} />

      {/* Right side — chat window floating on background */}
      <div className="chat-right" style={{flex: 1, background: '#f4f4f5', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 32}}>
        <div className="chat-card" style={{width: '100%', maxWidth: 480, height: '88vh', maxHeight: 660, background: 'white', borderRadius: 20, boxShadow: '0 12px 48px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04)', display: 'flex', flexDirection: 'column', overflow: 'hidden', border: '1px solid rgba(0,0,0,0.06)'}}>

          {!started ? (
            <div className="chat-start" style={{flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '40px 36px'}}>
              <div style={{textAlign: 'center'}}>
                <div style={{width: 48, height: 48, background: '#1a1d23', borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, color: 'white', fontWeight: 700, margin: '0 auto 16px'}}>
                  {config.branding.logo_text}
                </div>
                <h2 style={{fontSize: 20, fontWeight: 700, marginBottom: 8}}>{config.assistant_name}</h2>
                <p style={{fontSize: 14, color: 'var(--text-2)', marginBottom: 28, lineHeight: 1.6}}>
                  Describe what you need and we'll get you set up with the right team or platform.
                </p>
                <button className="btn" style={{fontSize: 14, padding: '11px 28px', background: '#1a1d23', color: 'white', border: 'none', borderRadius: 8}} onClick={startConversation}>
                  Start a new request
                </button>
              </div>
            </div>
          ) : (
            <>
              {/* Chat header */}
              <div style={{padding: '14px 20px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexShrink: 0}}>
                <div style={{display: 'flex', alignItems: 'center', gap: 10}}>
                  <div style={{width: 26, height: 26, background: '#1a1d23', borderRadius: 7, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: 'white', fontWeight: 700, cursor: 'pointer'}} onClick={resetChat}>
                    {config.branding.logo_text}
                  </div>
                  <span style={{fontSize: 13, fontWeight: 600}}>
                    {routeResult ? `Routed → ${routeResult.route === 'worksome' ? 'Worksome' : config.vms.name}` : 'Intake in progress'}
                  </span>
                </div>
                <div style={{display: 'flex', gap: 4, alignItems: 'center'}}>
                  <button className="btn btn-sm btn-ghost" onClick={resetChat} style={{fontSize: 12}}>New</button>
                  <button className="btn btn-sm btn-ghost" onClick={() => setPage('analytics')} style={{fontSize: 12}}>📊</button>
                  <button className="btn btn-sm btn-ghost" onClick={() => setPage('config')} style={{fontSize: 12}}>⚙️</button>
                </div>
              </div>

              {/* Messages */}
              <div ref={chatRef} className="chat-messages" style={{flex: 1, overflowY: 'auto', padding: '18px 20px', display: 'flex', flexDirection: 'column', gap: 12}}>
                {messages.map((m, i) => (
                  <div key={i} className={`chat-msg ${m.role}`}>
                    <div className="chat-avatar" style={{background: m.role === 'assistant' ? '#1a1d23' : '#4a90d9', width: 28, height: 28, fontSize: 11}}>
                      {m.role === 'assistant' ? config.branding.logo_text : 'You'}
                    </div>
                    <div>
                      <div className="chat-bubble" style={{whiteSpace: 'pre-wrap'}}>{m.text}</div>
                      <div className="chat-time">{now(m.time)}</div>
                    </div>
                  </div>
                ))}

                {loading && (
                  <div className="chat-msg assistant">
                    <div className="chat-avatar" style={{background: '#1a1d23', width: 28, height: 28, fontSize: 11}}>{config.branding.logo_text}</div>
                    <div className="chat-bubble">
                      <span className="typing-dot"></span>{' '}
                      <span className="typing-dot"></span>{' '}
                      <span className="typing-dot"></span>
                    </div>
                  </div>
                )}

                {error && (
                  <div style={{background: 'var(--red-bg)', border: '1px solid var(--red)', borderRadius: 'var(--radius)', padding: '10px 14px', fontSize: 13, color: 'var(--red)'}}>
                    {error}
                  </div>
                )}

                {quickReplies && !loading && !routeResult && (
                  <div className="chat-options" style={{marginLeft: 38}}>
                    {quickReplies.map((qr, i) => (
                      <button key={i} className="chat-option" onClick={() => handleSend(qr)}>{qr}</button>
                    ))}
                  </div>
                )}

                {routeResult && (() => {
                  const isWorksome = routeResult.route === 'worksome';
                  const dest = isWorksome ? 'Worksome' : config.vms.name;
                  const color = isWorksome ? 'var(--accent)' : 'var(--warn)';

                  // Determine the best URL to link to
                  let destUrl = isWorksome ? config.worksome_url : config.vms.url;
                  if (isWorksome && handoffResult && handoffResult.job_url) {
                    destUrl = handoffResult.job_url;
                  }
                  // Worker not found but details collected — send to trusted contacts to invite
                  const isNewWorker = isWorksome && routeResult.worker_found === false && routeResult.worker_email;
                  // Worker not found and no details — fallback to talent pool
                  const isRedirect = isWorksome && routeResult.worker_found === false && !routeResult.worker_email;
                  if (isRedirect) {
                    destUrl = config.worksome_talent_pool_url || config.worksome_url;
                  }

                  return (
                    <div className={`route-card ${isWorksome ? 'worksome' : 'vms'}`}>
                      <div style={{fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5, color, marginBottom: 4}}>
                        Routed → {dest}
                      </div>
                      <div style={{fontSize: 15, fontWeight: 600, marginBottom: 4}}>{routeResult.role_title || 'Role'}</div>

                          `Search the talent pool for ${routeResult.worker_name || 'your worker'}`

                          <>Confidence: {routeResult.confidence} · {routeResult.known_worker ? 'Known worker' : 'Talent search'}{routeResult.headcount > 1 ? ` · ${routeResult.headcount} people` : ''}</>
                        )}
                      </div>

                      {isWorksome && handoffLoading && (
                        <div style={{fontSize: 12, color: 'var(--text-3)', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6}}>
                          <span className="typing-dot"></span>
                          <span className="typing-dot"></span>
                          <span className="typing-dot"></span>

                        <div style={{fontSize: 12, color: 'var(--accent)', marginBottom: 8}}>

                            <span> · {handoffResult.worker_name} invited to talent pool</span>

                      )}

                      <a href={destUrl}

                        style={{display: 'inline-block', padding: '8px 18px', borderRadius: 'var(--radius)', fontSize: 13, fontWeight: 600, color: 'white', textDecoration: 'none', background: color}}>
                        {isRedirect ? 'Search talent pool →' : isNewWorker ? 'Invite to talent pool →' : `Continue in ${dest} →`}
                      </a>
                    </div>
                  );
                })()}
              </div>

              {/* Input bar */}
              {!routeResult && (
                <div className="chat-input-bar" style={{padding: '12px 20px', borderTop: '1px solid var(--border)', display: 'flex', gap: 8, flexShrink: 0, alignItems: 'center'}}>
                  <button
                    onClick={listening ? stopListening : startListening}
                    disabled={loading}
                    title={listening ? 'Stop listening' : 'Voice input'}
                    style={{
                      width: 36, height: 36, borderRadius: '50%', border: 'none', cursor: 'pointer',
                      display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
                      background: listening ? 'var(--red)' : 'var(--bg)',
                      color: listening ? 'white' : 'var(--text-2)',
                      transition: 'all 0.2s',
                      animation: listening ? 'pulse 1.5s ease-in-out infinite' : 'none',
                    }}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                      <line x1="12" y1="19" x2="12" y2="23"/>
                      <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                  </button>
                  <input ref={inputRef} className="input" placeholder={listening ? 'Listening...' : 'Or type your answer...'} value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleSend()}
                    disabled={loading} style={{borderRadius: 8}} />
                  <button className="btn btn-primary" onClick={() => handleSend()} disabled={loading || !input.trim()} style={{borderRadius: 8}}>Send</button>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// SVG CHART HELPERS
// ══════════════════════════════════════
function SvgBarChart({ data, barKeys, colors, labels, height = 220 }) {
  const maxVal = Math.max(...data.flatMap(d => barKeys.map(k => d[k])));
  const w = 500, h = height - 40, pad = { top: 10, right: 20, bottom: 30, left: 35 };
  const plotW = w - pad.left - pad.right, plotH = h - pad.top - pad.bottom;
  const groupW = plotW / data.length;
  const barW = Math.min(groupW * 0.35, 28);
  const yTicks = [0, Math.round(maxVal / 2), maxVal];

  return (
    <div>
      <svg viewBox={`0 0 ${w} ${h}`} style={{width: '100%', height: height - 20}}>
        {yTicks.map(t => {
          const y = pad.top + plotH - (t / maxVal) * plotH;
          return <g key={t}><line x1={pad.left} y1={y} x2={w - pad.right} y2={y} stroke="#e2e5ea" strokeDasharray="3 3" /><text x={pad.left - 6} y={y + 4} textAnchor="end" fontSize="11" fill="#9ba3b0">{t}</text></g>;
        })}
        {data.map((d, i) => {
          const cx = pad.left + groupW * i + groupW / 2;
          return (
            <g key={i}>
              <text x={cx} y={h - 6} textAnchor="middle" fontSize="11" fill="#9ba3b0">{d.week}</text>
              {barKeys.map((k, ki) => {
                const bh = (d[k] / maxVal) * plotH;
                const bx = cx - barKeys.length * barW / 2 + ki * (barW + 2);
                return <rect key={k} x={bx} y={pad.top + plotH - bh} width={barW} height={bh} rx="3" fill={colors[ki]} />;
              })}
            </g>
          );
        })}
      </svg>
      <div style={{display: 'flex', gap: 16, justifyContent: 'center'}}>
        {barKeys.map((k, i) => (
          <div key={k} style={{display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: '#5f6776'}}>
            <div style={{width: 10, height: 10, borderRadius: 2, background: colors[i]}} />
            {labels[i]}
          </div>
        ))}
      </div>
    </div>
  );
}

function SvgDonut({ slices, size = 160 }) {
  const total = slices.reduce((a, s) => a + s.value, 0);
  const r = 55, ir = 35, cx = size / 2, cy = size / 2;
  let cum = 0;
  const paths = slices.map((s, i) => {
    const frac = s.value / total;
    const startAngle = cum * 2 * Math.PI - Math.PI / 2;
    cum += frac;
    const endAngle = cum * 2 * Math.PI - Math.PI / 2;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + r * Math.cos(startAngle), y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(endAngle), y2 = cy + r * Math.sin(endAngle);
    const ix1 = cx + ir * Math.cos(endAngle), iy1 = cy + ir * Math.sin(endAngle);
    const ix2 = cx + ir * Math.cos(startAngle), iy2 = cy + ir * Math.sin(startAngle);
    const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${ir} ${ir} 0 ${large} 0 ${ix2} ${iy2} Z`;
    return <path key={i} d={d} fill={s.color} />;
  });

  return (
    <div style={{textAlign: 'center'}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{paths}</svg>
      <div style={{display: 'flex', gap: 16, justifyContent: 'center', marginTop: 8}}>
        {slices.map((s, i) => (
          <div key={i} style={{display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: '#5f6776'}}>
            <div style={{width: 10, height: 10, borderRadius: 2, background: s.color}} />
            {s.label} ({s.value})
          </div>
        ))}
      </div>
    </div>
  );
}

function SvgLineChart({ data, dataKey, height = 180 }) {
  const vals = data.map(d => d[dataKey]);
  const maxVal = Math.max(...vals), minVal = Math.min(...vals);
  const range = maxVal - minVal || 1;
  const w = 500, h = height - 30, pad = { top: 10, right: 20, bottom: 30, left: 35 };
  const plotW = w - pad.left - pad.right, plotH = h - pad.top - pad.bottom;
  const points = data.map((d, i) => ({
    x: pad.left + (i / (data.length - 1)) * plotW,
    y: pad.top + plotH - ((d[dataKey] - minVal) / range) * plotH
  }));
  const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const yTicks = [minVal, Math.round((minVal + maxVal) / 2), maxVal];

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width: '100%', height: height}}>
      {yTicks.map(t => {
        const y = pad.top + plotH - ((t - minVal) / range) * plotH;
        return <g key={t}><line x1={pad.left} y1={y} x2={w - pad.right} y2={y} stroke="#e2e5ea" strokeDasharray="3 3" /><text x={pad.left - 6} y={y + 4} textAnchor="end" fontSize="11" fill="#9ba3b0">{t}</text></g>;
      })}
      {data.map((d, i) => (
        <text key={i} x={points[i].x} y={h - 4} textAnchor="middle" fontSize="11" fill="#9ba3b0">{d.week}</text>
      ))}
      <path d={linePath} fill="none" stroke="#6b3fa0" strokeWidth="2" />
      {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="4" fill="#6b3fa0" />)}
    </svg>
  );
}
